<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System — Elliptical &amp; Eccentric Orbits</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #05060d;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #cfd6ff;
    }
    #ui {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      background: rgba(12, 16, 34, 0.72);
      border: 1px solid rgba(120, 140, 220, 0.25);
      border-radius: 10px;
      padding: 12px 14px;
      backdrop-filter: blur(6px);
      font-size: 13px;
      line-height: 1.5;
      max-width: 240px;
      user-select: none;
    }
    #ui h1 {
      font-size: 14px;
      margin: 0 0 8px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #ffffff;
    }
    #ui .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 6px 0;
    }
    #ui label { opacity: 0.85; }
    #ui input[type="range"] { width: 110px; accent-color: #7c8cff; }
    #ui .hint { opacity: 0.55; font-size: 11px; margin-top: 8px; }
    #ui button {
      background: rgba(124, 140, 255, 0.18);
      color: #cfd6ff;
      border: 1px solid rgba(124, 140, 255, 0.4);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    #ui button:hover { background: rgba(124, 140, 255, 0.32); }
  </style>
</head>
<body>
  <div id="ui">
    <h1>☉ Solar System</h1>
    <div class="row">
      <label for="speed">Speed</label>
      <input id="speed" type="range" min="0" max="5" step="0.05" value="1" />
    </div>
    <div class="row">
      <label for="orbits">Show orbits</label>
      <input id="orbits" type="checkbox" checked />
    </div>
    <div class="row">
      <label for="trails">Show trails</label>
      <input id="trails" type="checkbox" checked />
    </div>
    <div class="row">
      <button id="pause">Pause</button>
      <button id="reset">Reset</button>
    </div>
    <div class="hint">Scroll to zoom · drag to pan - click to have fun</div>
  </div>
  <script src="sketch.js"></script>
</body>
</html>
